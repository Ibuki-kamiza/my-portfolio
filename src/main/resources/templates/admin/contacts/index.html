<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>お問い合わせ管理</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

    <aside class="admin-sidebar">
        <div class="admin-sidebar-logo">Admin</div>
        <ul class="admin-sidebar-links">
            <li><a th:href="@{/admin/dashboard}">ダッシュボード</a></li>
            <li><a th:href="@{/admin/profile}">プロフィール</a></li>
            <li><a th:href="@{/admin/skills}">スキル</a></li>
            <li><a th:href="@{/admin/works}">作品</a></li>
            <li><a th:href="@{/admin/blog}">ブログ</a></li>
            <li><a th:href="@{/admin/contacts}" class="active">お問い合わせ</a></li>
        </ul>
        <div class="admin-sidebar-logout">
            <form th:action="@{/admin/logout}" method="post">
                <button type="submit" class="sidebar-logout-btn">ログアウト</button>
            </form>
        </div>
    </aside>

    <div class="admin-main">
        <div class="admin-topbar">
            <a th:href="@{/}">← フロントへ戻る</a>
        </div>
        <div class="admin-container">
            <h1>お問い合わせ管理</h1>
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>名前</th>
                        <th>メール</th>
                        <th>ジャンル</th>
                        <th>状態</th>
                        <th>受信日</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="contact : ${contacts}">
                        <td>
                            <a th:href="@{/admin/contacts/{id}(id=${contact.id})}"
                               th:text="${contact.name}"
                               class="contact-name-link">名前</a>
                        </td>
                        <td th:text="${contact.email}">メール</td>
                        <td th:text="${contact.genre} ?: 'その他'">ジャンル</td>
                        <td>
                            <span th:if="${contact.isRead}" class="contact-status-read">既読</span>
                            <span th:if="${!contact.isRead}" class="contact-status-unread">未読</span>
                        </td>
                        <td th:text="${#temporals.format(contact.createdAt, 'yyyy/MM/dd')}">日付</td>
                        <td>
                            <form th:action="@{/admin/contacts/{id}/delete(id=${contact.id})}" method="post">
                                <button type="submit" onclick="return confirm('削除しますか？')">削除</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script th:src="@{/js/admin.js}"></script>
</body>
</html>
