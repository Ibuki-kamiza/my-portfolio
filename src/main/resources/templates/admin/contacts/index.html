<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>お問い合わせ管理</title>
</head>
<body>

    <h1>お問い合わせ管理</h1>
    <a th:href="@{/admin/dashboard}">ダッシュボードへ戻る</a>

    <table>
        <thead>
            <tr>
                <th>名前</th>
                <th>メール</th>
                <th>メッセージ</th>
                <th>状態</th>
                <th>受信日</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="contact : ${contacts}">
                <td th:text="${contact.name}">名前</td>
                <td th:text="${contact.email}">メール</td>
                <td th:text="${contact.message}">メッセージ</td>
                <td th:text="${contact.isRead} ? '既読' : '未読'">状態</td>
                <td th:text="${#temporals.format(contact.createdAt, 'yyyy/MM/dd')}">日付</td>
                <td>
                    <form th:action="@{/admin/contacts/{id}/read(id=${contact.id})}" method="post">
                        <button type="submit" th:disabled="${contact.isRead}">既読にする</button>
                    </form>
                    <form th:action="@{/admin/contacts/{id}/delete(id=${contact.id})}" method="post">
                        <button type="submit" onclick="return confirm('削除しますか？')">削除</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

</body>
</html>
