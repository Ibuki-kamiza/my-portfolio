<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ブログ管理</title>
</head>
<body>

    <h1>ブログ管理</h1>
    <a th:href="@{/admin/dashboard}">ダッシュボードへ戻る</a>
    <a th:href="@{/admin/blog/new}">新規追加</a>

    <table>
        <thead>
            <tr>
                <th>タイトル</th>
                <th>公開</th>
                <th>作成日</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="post : ${posts}">
                <td th:text="${post.title}">タイトル</td>
                <td th:text="${post.published} ? '公開' : '非公開'">公開</td>
                <td th:text="${#temporals.format(post.createdAt, 'yyyy/MM/dd')}">日付</td>
                <td>
                    <a th:href="@{/admin/blog/{id}/edit(id=${post.id})}">編集</a>
                    <form th:action="@{/admin/blog/{id}/delete(id=${post.id})}" method="post">
                        <button type="submit" onclick="return confirm('削除しますか？')">削除</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

</body>
</html>
