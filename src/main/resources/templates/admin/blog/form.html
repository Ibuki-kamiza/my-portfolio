<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ブログ編集</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

    <aside class="admin-sidebar">
        <div class="admin-sidebar-logo">Admin</div>
        <ul class="admin-sidebar-links">
            <li><a th:href="@{/admin/dashboard}">ダッシュボード</a></li>
            <li><a th:href="@{/admin/profile}">プロフィール</a></li>
            <li><a th:href="@{/admin/skills}">スキル</a></li>
            <li><a th:href="@{/admin/works}">作品</a></li>
            <li><a th:href="@{/admin/blog}" class="active">ブログ</a></li>
            <li><a th:href="@{/admin/contacts}">お問い合わせ</a></li>
        </ul>
        <div class="admin-sidebar-logout">
            <form th:action="@{/admin/logout}" method="post">
                <button type="submit" class="sidebar-logout-btn">ログアウト</button>
            </form>
        </div>
    </aside>

    <div class="admin-main">
        <div class="admin-topbar">
            <a th:href="@{/}">← フロントへ戻る</a>
        </div>
        <div class="admin-container">
            <h1 th:text="${post.id} ? '記事を編集' : '記事を追加'">ブログフォーム</h1>
            <a th:href="@{/admin/blog}" class="admin-btn admin-btn-outline">一覧へ戻る</a>

            <div class="admin-form">
                <form th:action="${post.id} ? @{/admin/blog/{id}/edit(id=${post.id})} : @{/admin/blog/new}"
                      th:object="${post}" method="post" enctype="multipart/form-data">

                    <div class="form-group">
                        <label class="form-label">タイトル</label>
                        <input type="text" th:field="*{title}" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">アイキャッチ画像（ファイルアップロード）</label>
                        <div th:if="${post.imageUrl}" class="blog-image-preview">
                            <img th:src="${post.imageUrl}" alt="現在の画像">
                        </div>
                        <input type="file" name="imageFile" class="form-file" accept="image/*">
                    </div>
                    <div class="form-group">
                        <label class="form-label">画像URL（直接入力）</label>
                        <input type="text" th:field="*{imageUrl}" class="form-input"
                               placeholder="https://... またはアップロードで自動入力">
                    </div>
                    <div class="form-group">
                        <label class="form-label">内容</label>
                        <textarea th:field="*{content}" class="form-textarea" rows="20"></textarea>
                    </div>
                    <div class="form-group">
                        <div class="checkbox-group">
                            <input type="checkbox" th:field="*{published}" id="published">
                            <label for="published" class="form-label">公開する</label>
                        </div>
                    </div>

                    <button type="submit" class="admin-btn admin-btn-dark">保存</button>
                </form>
            </div>
        </div>
    </div>

    <script th:src="@{/js/admin.js}"></script>
</body>
</html>
