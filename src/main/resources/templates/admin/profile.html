<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>プロフィール編集</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

    <aside class="admin-sidebar">
        <div class="admin-sidebar-logo">Admin</div>
        <ul class="admin-sidebar-links">
            <li><a th:href="@{/admin/dashboard}">ダッシュボード</a></li>
            <li><a th:href="@{/admin/profile}" class="active">プロフィール</a></li>
            <li><a th:href="@{/admin/skills}">スキル</a></li>
            <li><a th:href="@{/admin/works}">作品</a></li>
            <li><a th:href="@{/admin/blog}">ブログ</a></li>
            <li><a th:href="@{/admin/contacts}">お問い合わせ</a></li>
        </ul>
        <div class="admin-sidebar-logout">
            <form th:action="@{/admin/logout}" method="post">
                <button type="submit" style="background:none;border:none;color:rgba(255,255,255,0.4);font-size:12px;letter-spacing:0.1em;cursor:pointer;padding:0;">ログアウト</button>
            </form>
        </div>
    </aside>

    <div class="admin-main">
        <div class="admin-topbar">
            <a th:href="@{/}">← フロントへ戻る</a>
        </div>
        <div class="admin-container">
            <h1>プロフィール編集</h1>
            <div th:if="${param.saved}" class="alert-success">保存しました！</div>
            <div class="admin-form">
                <form th:action="@{/admin/profile}" th:object="${profile}" method="post">
                    <div class="form-group">
                        <label class="form-label">名前</label>
                        <input type="text" th:field="*{name}" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">自己紹介</label>
                        <textarea th:field="*{bio}" class="form-textarea"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">GitHub URL</label>
                        <input type="text" th:field="*{githubUrl}" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">アバター画像URL</label>
                        <input type="text" th:field="*{avatarUrl}" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">新しいパスコード（6桁・変更する場合のみ）</label>
                        <input type="password" name="newPasscode" class="form-input"
                               maxlength="6" pattern="[0-9]{6}" placeholder="数字6桁">
                    </div>
                    <button type="submit" class="admin-btn admin-btn-dark">保存</button>
                </form>
            </div>
        </div>
    </div>
	<script th:src="@{/js/admin.js}"></script>

</body>
</html>
