<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>作品管理</title>
</head>
<body>

    <h1>作品管理</h1>
    <a th:href="@{/admin/dashboard}">ダッシュボードへ戻る</a>
    <a th:href="@{/admin/works/new}">新規追加</a>

    <table>
        <thead>
            <tr>
                <th>タイトル</th>
                <th>技術スタック</th>
                <th>公開</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="work : ${works}">
                <td th:text="${work.title}">タイトル</td>
                <td th:text="${work.techStack}">技術スタック</td>
                <td th:text="${work.published} ? '公開' : '非公開'">公開</td>
                <td>
                    <a th:href="@{/admin/works/{id}/edit(id=${work.id})}">編集</a>
                    <form th:action="@{/admin/works/{id}/delete(id=${work.id})}" method="post">
                        <button type="submit" onclick="return confirm('削除しますか？')">削除</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

</body>
</html>
