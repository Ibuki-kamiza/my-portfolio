<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>作品編集</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link href="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.snow.css" rel="stylesheet">
</head>
<body>

    <aside class="admin-sidebar">
        <div class="admin-sidebar-logo">Admin</div>
        <ul class="admin-sidebar-links">
            <li><a th:href="@{/admin/dashboard}">ダッシュボード</a></li>
            <li><a th:href="@{/admin/profile}">プロフィール</a></li>
            <li><a th:href="@{/admin/skills}">スキル</a></li>
            <li><a th:href="@{/admin/careers}">キャリア</a></li>
            <li><a th:href="@{/admin/works}" class="active">作品</a></li>
            <li><a th:href="@{/admin/blog}">ブログ</a></li>
            <li><a th:href="@{/admin/contacts}">お問い合わせ</a></li>
        </ul>
        <div class="admin-sidebar-logout">
            <form th:action="@{/admin/logout}" method="post">
                <button type="submit" class="sidebar-logout-btn">ログアウト</button>
            </form>
        </div>
    </aside>

    <div class="admin-main">
        <div class="admin-topbar">
            <a th:href="@{/}">← フロントへ戻る</a>
        </div>
        <div class="admin-container">
            <h1 th:text="${work.id} ? '作品を編集' : '作品を追加'">作品フォーム</h1>
            <a th:href="@{/admin/works}" class="admin-btn admin-btn-outline">一覧へ戻る</a>

            <div class="admin-form">
                <form th:action="${work.id} ? @{/admin/works/{id}/edit(id=${work.id})} : @{/admin/works/new}"
                      th:object="${work}" method="post" enctype="multipart/form-data"
                      id="works-form">

                    <div class="form-group">
                        <label class="form-label">タイトル</label>
                        <input type="text" th:field="*{title}" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">説明</label>
                        <div id="quill-editor"></div>
                        <input type="hidden" th:field="*{description}" id="description-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">技術スタック</label>
                        <input type="text" th:field="*{techStack}" class="form-input" placeholder="Java, Spring Boot, MySQL">
                    </div>
                    <div class="form-group">
                        <label class="form-label">画像（ファイルアップロード）</label>
                        <div th:if="${work.imageUrl}" class="blog-image-preview">
                            <img th:src="${work.imageUrl}" th:alt="${work.title}">
                        </div>
                        <input type="file" name="imageFile" class="form-file" accept="image/*">
                    </div>
                    <div class="form-group">
                        <label class="form-label">画像URL（直接入力・Google Drive等）</label>
                        <input type="text" th:field="*{imageUrl}" class="form-input"
                               placeholder="https://lh3.googleusercontent.com/d/...">
                    </div>
                    <div class="form-group">
                        <label class="form-label">GitHub URL</label>
                        <input type="text" th:field="*{githubUrl}" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">デモURL</label>
                        <input type="text" th:field="*{demoUrl}" class="form-input">
                    </div>
                    <div class="form-group">
                        <div class="checkbox-group">
                            <input type="checkbox" th:field="*{published}" id="published">
                            <label for="published" class="form-label">公開する</label>
                        </div>
                    </div>
                    <button type="submit" class="admin-btn admin-btn-dark">保存</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.js"></script>
    <script th:src="@{/js/admin.js}"></script>
    <script th:src="@{/js/works-editor.js}"></script>
</body>
</html>
