<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品一覧</title>
</head>
<body>

    <h1>作品一覧</h1>
    <a th:href="@{/}">トップへ戻る</a>

    <div th:each="work : ${works}">
        <h2>
            <a th:href="@{/works/{id}(id=${work.id})}" th:text="${work.title}">タイトル</a>
        </h2>
        <p th:text="${work.description}">説明</p>
        <p th:text="${work.techStack}">技術スタック</p>
    </div>

</body>
</html>
